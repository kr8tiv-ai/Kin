services:
  api:
    image: ghcr.io/${GHCR_OWNER:-kr8tiv-ai}/kin-api:${KIN_IMAGE_TAG:-latest}
    container_name: kin-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3002}:3002"
    volumes:
      - kin-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3002
      - DATABASE_PATH=/app/data/kin.db
      - OLLAMA_HOST=inference
      - OLLAMA_PORT=11434
    depends_on:
      - inference
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ghcr.io/${GHCR_OWNER:-kr8tiv-ai}/kin-web:${KIN_IMAGE_TAG:-latest}
    container_name: kin-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3001
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:3002}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  inference:
    image: ghcr.io/${GHCR_OWNER:-kr8tiv-ai}/kin-inference:${KIN_IMAGE_TAG:-latest}
    container_name: kin-inference
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:11434/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kin-data:
  ollama-models:
