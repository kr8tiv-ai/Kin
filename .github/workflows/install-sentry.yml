name: Install Sentry Dependencies
on:
  workflow_dispatch:
jobs:
  install-sentry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install @sentry/node at root
        run: npm install @sentry/node
      - name: Install @sentry/nextjs in web
        run: |
          cd web
          npm install @sentry/nextjs
      - name: Commit changes
        run: |
          git config user.name "Matt Haynes"
          git config user.email "matt@kr8tiv.ai"
          git add package.json package-lock.json web/package.json web/package-lock.json
          git commit -m "chore: install Sentry SDK packages

          - @sentry/node at root for API error tracking
          - @sentry/nextjs in web/ for frontend error tracking"
          git push