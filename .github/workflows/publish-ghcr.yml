name: Publish GHCR Runtime Images

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile.api
      - docker/Dockerfile.web
      - docker/Dockerfile.inference
      - scripts/ghcr-contract.ts
      - .github/workflows/publish-ghcr.yml
      - package.json
      - package-lock.json
      - web/package.json
      - web/package-lock.json
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: kin-api
            dockerfile: docker/Dockerfile.api
          - service: web
            image: kin-web
            dockerfile: docker/Dockerfile.web
          - service: inference
            image: kin-inference
            dockerfile: docker/Dockerfile.inference

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-
          labels: |
            io.kr8tiv.kin.service=${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish step summary
        run: |
          {
            echo "### GHCR publish result — ${{ matrix.service }}"
            echo ""
            echo "- Dockerfile: \`${{ matrix.dockerfile }}\`"
            echo "- Image: \`ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}\`"
            echo "- Tags:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
          } >> "$GITHUB_STEP_SUMMARY"
